spring.application.name=delivery

spring.datasource.url=jdbc:mysql://localhost:3306/delivery?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.config.import=optional:file:./config/application-secret.properties

server.port=8081

cookie.secure=false